services:
  - type: web
    name: midnight-hospital-api
    runtime: node
    plan: free
    branch: main
    buildCommand: npm ci && npm run build
    startCommand: npm start
    healthCheckPath: /healthz
    envVars:
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: DEEPSEEK_MODEL
        value: deepseek-v4-flash
      - key: STORY_API_ALLOWED_ORIGIN
        value: https://13212557720.github.io
